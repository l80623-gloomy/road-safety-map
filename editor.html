<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熱點位置編輯工具（管理員）</title>
  <style>
    :root {
      --navy: #1c2d42; --orange: #e07920;
      --bg: #f4f0e8; --card: #fff;
      --text: #1a1a2e; --sub: #5a6478; --border: #e0dbd0;
      --red: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft JhengHei","Noto Sans TC",sans-serif; background: #0f172a; color: var(--text); min-height: 100vh; }

    .admin-bar {
      background: #7f1d1d; color: #fecaca;
      text-align: center; padding: 10px 20px;
      font-size: 13px; font-weight: 700; letter-spacing: 1px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .layout {
      display: grid; grid-template-columns: 1fr 340px;
      height: calc(100vh - 42px);
    }

    /* ── 地圖區 ── */
    .map-pane { background: #1e293b; display: flex; flex-direction: column; overflow: hidden; }

    .map-toolbar {
      background: #1e293b; border-bottom: 1px solid #334155;
      padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .toolbar-title { font-size: 13px; font-weight: 700; color: #94a3b8; }

    .map-tab {
      padding: 5px 16px; border-radius: 6px; border: 1px solid #475569;
      background: transparent; color: #94a3b8; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background .15s, color .15s;
    }
    .map-tab.active { background: var(--orange); border-color: var(--orange); color: #fff; }

    .add-btn {
      margin-left: auto; padding: 6px 16px; border-radius: 6px;
      border: 1px dashed #475569; background: transparent; color: #94a3b8;
      font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: background .15s, color .15s, border-color .15s;
    }
    .add-btn:hover { background: #334155; color: #e2e8f0; }
    .add-btn.adding { background: #16a34a; border-color: #16a34a; color: #fff; }

    .map-stage {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 20px; overflow: hidden;
    }

    .map-wrap { position: relative; display: inline-block; line-height: 0; }
    .map-wrap.add-mode { cursor: crosshair; }

    #map-img {
      max-width: 100%; max-height: calc(100vh - 150px);
      border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,.5);
      display: block; user-select: none; pointer-events: none;
    }

    /* ── 熱點標記 ── */
    .hs-marker {
      position: absolute; width: 44px; height: 44px;
      transform: translate(-50%, -50%); cursor: grab; z-index: 10;
      touch-action: none; user-select: none;
    }
    .hs-marker:active { cursor: grabbing; }
    .hs-marker .ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(220,38,38,.5);
    }
    .hs-marker.selected .ring { border-color: rgba(217,119,6,.7); }
    .hs-marker .dot {
      position: absolute; inset: 10px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #f87171, #dc2626);
      box-shadow: 0 2px 10px rgba(220,38,38,.6);
      transition: transform .1s;
    }
    .hs-marker:hover .dot { transform: scale(1.15); }
    .hs-marker.selected .dot { background: radial-gradient(circle at 35% 35%, #fbbf24, #d97706); box-shadow: 0 2px 10px rgba(251,191,36,.7); }
    .hs-label {
      position: absolute; left: 50%; top: -26px; transform: translateX(-50%);
      background: rgba(0,0,0,.8); color: #fff; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px; white-space: nowrap; pointer-events: none;
    }
    .coord-tip {
      position: absolute; left: 50%; bottom: -20px; transform: translateX(-50%);
      background: #1e293b; color: #fbbf24; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px; white-space: nowrap;
      pointer-events: none; font-family: monospace;
    }

    /* ── 控制面板 ── */
    .ctrl-pane {
      background: #0f172a; border-left: 1px solid #1e293b;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .ctrl-head {
      padding: 14px 16px; border-bottom: 1px solid #1e293b;
      font-size: 13px; font-weight: 700; color: #94a3b8; letter-spacing: 1px; flex-shrink: 0;
    }
    .ctrl-scroll { flex: 1; overflow-y: auto; padding: 14px 14px 0; }
    .ctrl-scroll::-webkit-scrollbar { width: 4px; }
    .ctrl-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .hs-card {
      background: #1e293b; border-radius: 10px; border: 1px solid #334155;
      margin-bottom: 10px; overflow: hidden; transition: border-color .15s;
    }
    .hs-card.selected { border-color: #d97706; }
    .hs-card-head {
      padding: 10px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .hs-card-num {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--red); color: #fff; font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .hs-card.selected .hs-card-num { background: #d97706; }
    .hs-name-input {
      flex: 1; background: #0f172a; border: 1px solid #475569; color: #e2e8f0;
      font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
      font-family: inherit; min-width: 0;
    }
    .del-btn {
      background: transparent; border: none; color: #64748b; font-size: 14px;
      cursor: pointer; padding: 2px 6px; border-radius: 4px;
      transition: background .15s, color .15s;
    }
    .del-btn:hover { background: #450a0a; color: #f87171; }

    .hs-card-body { padding: 0 12px 12px; }
    .coord-section-label {
      font-size: 10px; font-weight: 700; color: #475569; letter-spacing: 2px;
      margin: 8px 0 5px; display: flex; align-items: center; gap: 6px;
    }
    .coord-section-label::after { content: ''; flex: 1; height: 1px; background: #334155; }
    .coord-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 2px; }
    .coord-field label { font-size: 10px; font-weight: 700; color: #64748b; letter-spacing: 1px; display: block; margin-bottom: 3px; }
    .coord-field input {
      width: 100%; background: #020617; border: 1px solid #475569; color: #fbbf24;
      font-size: 13px; font-weight: 700; padding: 5px 8px; border-radius: 5px;
      font-family: monospace; transition: border-color .15s;
    }
    .coord-field input:focus { outline: none; border-color: #d97706; }
    .gen-btn {
      width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #334155;
      background: #0f172a; color: #94a3b8; font-size: 11px; font-weight: 700;
      cursor: pointer; font-family: inherit; margin-top: 8px;
      transition: background .15s, color .15s;
    }
    .gen-btn:hover { background: #1e293b; color: #e2e8f0; }

    .output-section { flex-shrink: 0; border-top: 1px solid #1e293b; padding: 14px; }
    .output-label {
      font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 2px;
      margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
    }
    .copy-btn {
      background: var(--orange); border: none; color: #fff; font-size: 11px; font-weight: 700;
      padding: 3px 12px; border-radius: 4px; cursor: pointer; font-family: inherit;
      transition: background .15s;
    }
    .copy-btn:hover { background: #c86d18; }
    .copy-btn.copied { background: #16a34a; }
    .output-box {
      background: #020617; border: 1px solid #1e293b; border-radius: 8px;
      padding: 10px 12px; font-family: monospace; font-size: 11px; color: #7dd3fc;
      line-height: 1.7; max-height: 180px; overflow-y: auto; white-space: pre;
    }
    .output-box::-webkit-scrollbar { width: 3px; }
    .output-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .status-bar {
      background: #1e293b; border-top: 1px solid #334155;
      padding: 7px 14px; font-size: 11px; color: #475569;
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; flex-shrink: 0; }
  </style>
</head>
<body>

<div class="admin-bar">
  🔒&nbsp; 管理員工具 — 熱點位置編輯器 &nbsp;｜&nbsp; 此頁面請勿對外分享 &nbsp;🔒
</div>

<div class="layout">

  <!-- 地圖 -->
  <div class="map-pane">
    <div class="map-toolbar">
      <span class="toolbar-title">地圖模式</span>
      <button class="map-tab active" id="tab-h" onclick="switchMap('h')">🖥️ 橫式（桌面）</button>
      <button class="map-tab"        id="tab-v" onclick="switchMap('v')">📱 直式（手機）</button>
      <button class="add-btn" id="add-btn" onclick="toggleAddMode()">＋ 新增熱點</button>
    </div>
    <div class="map-stage">
      <div class="map-wrap" id="map-wrap" onclick="handleMapClick(event)">
        <img id="map-img" src="./橫式Q地圖.png" alt="地圖" draggable="false">
      </div>
    </div>
  </div>

  <!-- 控制面板 -->
  <div class="ctrl-pane">
    <div class="ctrl-head">📍 熱點列表</div>
    <div class="ctrl-scroll" id="hs-list"></div>
    <div class="output-section">
      <div class="output-label">
        <span>📋 輸出程式碼</span>
        <button class="copy-btn" id="copy-btn" onclick="copyCode()">複製</button>
      </div>
      <div class="output-box" id="output-box">點擊下方「產生程式碼」…</div>
    </div>
    <div class="status-bar">
      <div class="status-dot"></div>
      <span id="status-msg">拖曳紅點調整位置，座標即時更新</span>
    </div>
  </div>

</div>

<script>
/* ══ 資料 ══ */
let hotspots = [
  { id:'hs1', name:'合作街2號前路段', hx:69.0, hy:54.0, vx:72.5, vy:56.0 }
];
let mapMode  = 'h';
let addMode  = false;
let selected = null;
let nextId   = 2;
let drag     = null;   // 拖曳狀態物件

/* ══ 地圖切換 ══ */
function switchMap(mode) {
  mapMode = mode;
  document.getElementById('map-img').src = mode==='h' ? './橫式Q地圖.png' : './直式Q地圖.png';
  document.getElementById('tab-h').classList.toggle('active', mode==='h');
  document.getElementById('tab-v').classList.toggle('active', mode==='v');
  renderMarkers();
  setStatus(mode==='h' ? '橫式地圖（桌面座標）' : '直式地圖（手機座標）');
}

/* ══ 新增模式 ══ */
function toggleAddMode() {
  addMode = !addMode;
  const btn  = document.getElementById('add-btn');
  const wrap = document.getElementById('map-wrap');
  btn.classList.toggle('adding', addMode);
  btn.textContent = addMode ? '✕ 取消新增' : '＋ 新增熱點';
  wrap.classList.toggle('add-mode', addMode);
  setStatus(addMode ? '請點擊地圖上想放置熱點的位置' : '拖曳紅點調整位置');
}

function handleMapClick(e) {
  if (!addMode) return;
  if (e.target.closest('.hs-marker')) return;
  const img  = document.getElementById('map-img');
  const rect = img.getBoundingClientRect();
  const x    = +((e.clientX - rect.left) / rect.width  * 100).toFixed(1);
  const y    = +((e.clientY - rect.top)  / rect.height * 100).toFixed(1);
  const name = prompt('請輸入此熱點名稱：', '新熱點');
  if (!name) return;
  const id = 'hs' + nextId++;
  hotspots.push({ id, name: name.trim(), hx:x, hy:y, vx:x, vy:y });
  toggleAddMode();
  renderAll();
  setStatus(`已新增「${name}」，請切換至另一地圖調整手機座標`);
}

/* ══ 渲染標記 ══ */
function renderMarkers() {
  const wrap = document.getElementById('map-wrap');
  wrap.querySelectorAll('.hs-marker').forEach(el => el.remove());
  hotspots.forEach((hs, idx) => {
    const x  = mapMode==='h' ? hs.hx : hs.vx;
    const y  = mapMode==='h' ? hs.hy : hs.vy;
    const el = document.createElement('div');
    el.className   = 'hs-marker' + (selected===hs.id ? ' selected' : '');
    el.dataset.id  = hs.id;
    el.style.left  = x + '%';
    el.style.top   = y + '%';
    el.innerHTML   = `
      <div class="ring"></div>
      <div class="dot"></div>
      <div class="hs-label">${idx+1}. ${hs.name}</div>
      <div class="coord-tip">${x}%, ${y}%</div>`;
    el.addEventListener('pointerdown', startDrag);
    wrap.appendChild(el);
  });
}

/* ══ 渲染面板 ══ */
function renderPanel() {
  const list = document.getElementById('hs-list');
  list.innerHTML = '';
  if (!hotspots.length) {
    list.innerHTML = '<div style="color:#475569;font-size:12px;text-align:center;padding:24px;">尚無熱點，點擊「新增熱點」開始</div>';
    return;
  }
  hotspots.forEach((hs, idx) => {
    const div = document.createElement('div');
    div.className  = 'hs-card' + (selected===hs.id ? ' selected' : '');
    div.dataset.id = hs.id;
    div.innerHTML  = `
      <div class="hs-card-head" onclick="selectHs('${hs.id}')">
        <div class="hs-card-num">${idx+1}</div>
        <input class="hs-name-input" type="text" value="${hs.name}"
               onchange="renameHs('${hs.id}',this.value)" onclick="event.stopPropagation()">
        <button class="del-btn" onclick="deleteHs('${hs.id}',event)">✕</button>
      </div>
      <div class="hs-card-body">
        <div class="coord-section-label">🖥️ 桌面（橫式）</div>
        <div class="coord-row">
          <div class="coord-field"><label>LEFT %</label>
            <input type="number" step="0.1" id="${hs.id}-hx" value="${hs.hx}"
                   onchange="manualSet('${hs.id}','hx',+this.value)"></div>
          <div class="coord-field"><label>TOP %</label>
            <input type="number" step="0.1" id="${hs.id}-hy" value="${hs.hy}"
                   onchange="manualSet('${hs.id}','hy',+this.value)"></div>
        </div>
        <div class="coord-section-label">📱 手機（直式）</div>
        <div class="coord-row">
          <div class="coord-field"><label>LEFT %</label>
            <input type="number" step="0.1" id="${hs.id}-vx" value="${hs.vx}"
                   onchange="manualSet('${hs.id}','vx',+this.value)"></div>
          <div class="coord-field"><label>TOP %</label>
            <input type="number" step="0.1" id="${hs.id}-vy" value="${hs.vy}"
                   onchange="manualSet('${hs.id}','vy',+this.value)"></div>
        </div>
        <button class="gen-btn" onclick="genForHs('${hs.id}')">📋 產生此熱點程式碼</button>
      </div>`;
    list.appendChild(div);
  });
}

function renderAll() { renderMarkers(); renderPanel(); }

/* ══ 選取 ══ */
function selectHs(id) {
  selected = selected===id ? null : id;
  renderAll();
}

/* ══ 拖曳（核心修正：用 document 層級事件，不在拖曳中重建 DOM）══ */
function startDrag(e) {
  if (addMode) return;
  e.preventDefault();
  e.stopPropagation();

  const el  = e.currentTarget;
  const id  = el.dataset.id;
  const img = document.getElementById('map-img');

  // 只改 class，不重建 DOM
  document.querySelectorAll('.hs-marker').forEach(m =>
    m.classList.toggle('selected', m.dataset.id===id));
  document.querySelectorAll('.hs-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.id===id));
  selected = id;

  // 記錄起始資訊
  drag = { id, el, imgRect: img.getBoundingClientRect() };

  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup',   onDragUp);
}

function onDragMove(e) {
  if (!drag) return;
  const { id, el, imgRect } = drag;
  let x = +((e.clientX - imgRect.left) / imgRect.width  * 100).toFixed(1);
  let y = +((e.clientY - imgRect.top)  / imgRect.height * 100).toFixed(1);
  x = Math.max(0, Math.min(100, x));
  y = Math.max(0, Math.min(100, y));

  const hs = hotspots.find(h => h.id===id);
  if (!hs) return;
  if (mapMode==='h') { hs.hx=x; hs.hy=y; } else { hs.vx=x; hs.vy=y; }

  // 直接更新標記位置（不重建 DOM）
  el.style.left = x + '%';
  el.style.top  = y + '%';
  el.querySelector('.coord-tip').textContent = `${x}%, ${y}%`;

  // 同步面板數字
  const fX = document.getElementById(id + (mapMode==='h' ? '-hx' : '-vx'));
  const fY = document.getElementById(id + (mapMode==='h' ? '-hy' : '-vy'));
  if (fX) fX.value = x;
  if (fY) fY.value = y;

  setStatus(`拖曳中 ▶ left ${x}%　top ${y}%`);
}

function onDragUp() {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup',   onDragUp);
  drag = null;
  setStatus('位置已更新 ✔ 點擊「產生程式碼」取得貼入 index.html 的內容');
}

/* ══ 手動輸入 ══ */
function manualSet(id, key, val) {
  const hs = hotspots.find(h => h.id===id);
  if (!hs) return;
  hs[key] = val;
  renderMarkers();
}

function renameHs(id, name) {
  const hs = hotspots.find(h => h.id===id);
  if (hs) { hs.name = name; renderMarkers(); }
}

/* ══ 刪除 ══ */
function deleteHs(id, e) {
  e.stopPropagation();
  if (!confirm('確定要刪除此熱點？')) return;
  hotspots = hotspots.filter(h => h.id!==id);
  if (selected===id) selected = null;
  renderAll();
  setStatus('熱點已刪除');
}

/* ══ 產生程式碼 ══ */
function genForHs(id) {
  const hs = hotspots.find(h => h.id===id);
  if (!hs) return;
  const n = hs.id.replace('hs','');
  const code =
`<!-- ★ 貼入 index.html <picture> 後方 -->
<button class="hotspot hs-${n}"
        style="left:${hs.hx}%;top:${hs.hy}%"
        onclick="openModal('${hs.id}')"
        title="${hs.name}">
  <span class="hs-ring"></span>
  <span class="hs-ring2"></span>
  <span class="hs-dot"></span>
</button>

/* ★ 貼入 @media (max-width:768px) 區塊 */
.hs-${n} { left:${hs.vx}% !important; top:${hs.vy}% !important; }`;
  document.getElementById('output-box').textContent = code;
  selected = id;
  renderAll();
}

function copyCode() {
  const text = document.getElementById('output-box').textContent;
  if (text.startsWith('點擊')) { setStatus('請先點擊「產生程式碼」'); return; }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '已複製 ✔'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2200);
    setStatus('已複製到剪貼簿！');
  });
}

function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

/* ══ 初始化 ══ */
renderAll();
</script>
</body>
</html>
